<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小游戏网</title>
    <link rel="icon" href="./favicon.ico?v=1" type="image/x-icon">
    <link rel="icon" href="./favicon.ico?v=1" type="image/vnd.microsoft.icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #0b0e2a 0%, #1a1f4e 40%, #2d1b4e 100%);
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 20px;
            position: relative;
        }

        /* 星星背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--dur, 3s) ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* 顶部按钮 */
        .top-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 10;
        }
        .top-btn:hover {
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.1);
        }

        /* 标题 */
        .title {
            font-size: clamp(2.5rem, 10vw, 5rem);
            font-weight: 900;
            background: linear-gradient(135deg, #feda75, #ff7eb3, #ff758c, #f5b8ea);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradShift 4s ease-in-out infinite alternate;
            text-shadow: 0 0 40px rgba(255, 120, 180, 0.4);
            letter-spacing: 4px;
            text-align: center;
            position: relative;
            z-index: 2;
        }
        .title::after {
            content: '🎮';
            display: inline-block;
            margin-left: 10px;
            -webkit-text-fill-color: initial;
            animation: wiggle 1.2s ease-in-out infinite;
        }
        @keyframes gradShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }
        @keyframes wiggle {
            0%, 100% { transform: rotate(-8deg); }
            50% { transform: rotate(8deg); }
        }

        /* 副标题 */
        .subtitle {
            font-size: clamp(1rem, 3vw, 1.4rem);
            color: rgba(255, 255, 255, 0.6);
            margin-top: 15px;
            letter-spacing: 2px;
            position: relative;
            z-index: 2;
        }

        /* 游戏占位区域 */
        .game-area {
            margin-top: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.1rem;
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 500px;
        }

        /* 底部按钮 */
        .bottom-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            background: rgba(255, 100, 100, 0.2);
            color: rgba(255, 150, 150, 0.9);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 100, 100, 0.3);
            z-index: 10;
        }
        .bottom-btn:hover {
            background: rgba(255, 100, 100, 0.3);
            color: #ff8888;
            transform: translateX(-50%) translateY(-2px);
            box-shadow: 0 4px 20px rgba(255, 100, 100, 0.2);
        }

        /* 模态框遮罩 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show {
            display: flex;
        }

        /* 模态框内容 */
        .modal {
            background: linear-gradient(145deg, #1a1f4e, #2d1b4e);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: modalIn 0.3s ease-out;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 1px;
        }

        .modal-content {
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.8;
            font-size: 1rem;
        }

        .modal-content p {
            margin-bottom: 12px;
        }

        .modal-content strong {
            color: #ff7eb3;
        }

        .modal-email {
            background: rgba(255, 255, 255, 0.08);
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            font-family: monospace;
            font-size: 0.95rem;
            word-break: break-all;
            color: #feda75;
            text-align: center;
        }

        .modal-close {
            display: block;
            width: 100%;
            margin-top: 25px;
            padding: 12px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
        }
        .modal-close:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.4);
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .top-btn {
                padding: 8px 14px;
                font-size: 0.75rem;
                top: 15px;
                right: 15px;
            }
            .bottom-btn {
                padding: 10px 22px;
                font-size: 0.9rem;
                bottom: 15px;
            }
            .modal {
                padding: 22px;
            }
            .modal-title {
                font-size: 1.3rem;
            }
            .game-area {
                padding: 20px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- 星星背景 -->
    <div class="stars" id="stars"></div>

    <!-- 顶部按钮 -->
    <button class="top-btn" id="suggestBtn">没找到想玩的游戏？</button>

    <!-- 主内容 -->
    <div class="main-content">
        <h1 class="title">小游戏网</h1>
        <p class="subtitle">🎮 快乐游戏，精彩无限</p>
        
        <div class="game-area">
            <p>🎯 游戏列表正在建设中...</p>
            <p style="margin-top: 10px; font-size: 0.9rem;">更多精彩游戏即将上线，敬请期待！</p>
        </div>
    </div>

    <!-- 底部按钮 -->
    <button class="bottom-btn" id="bugBtn">有bug?</button>

    <!-- 反馈游戏模态框 -->
    <div class="modal-overlay" id="suggestModal">
        <div class="modal">
            <h2 class="modal-title">🎮 提交新游戏</h2>
            <div class="modal-content">
                <p><strong>请把想玩的游戏反馈到邮箱：</strong></p>
                <p><strong>标题：</strong>提交新游戏</p>
                <p><strong>正文格式：</strong></p>
                <p>游戏名，游戏规则(尽量详细)</p>
                <div class="modal-email">📧 3800432301@qq.com</div>
            </div>
            <button class="modal-close" onclick="closeModal('suggestModal')">知道了</button>
        </div>
    </div>

    <!-- 反馈bug模态框 -->
    <div class="modal-overlay" id="bugModal">
        <div class="modal">
            <h2 class="modal-title">🐛 反馈Bug</h2>
            <div class="modal-content">
                <p><strong>请把bug反馈到邮箱：</strong></p>
                <p><strong>标题：</strong>反馈bug</p>
                <p><strong>正文：</strong>尽量详细的描述bug</p>
                <div class="modal-email">📧 3800432301@qq.com</div>
            </div>
            <button class="modal-close" onclick="closeModal('bugModal')">知道了</button>
        </div>
    </div>

    <script>
        // 初始化星星背景
        (function initStars() {
            const container = document.getElementById('stars');
            const count = 80;
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = 1 + Math.random() * 2.5;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--dur', (2 + Math.random() * 4) + 's');
                star.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(star);
            }
        })();

        // 模态框操作
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('show');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }

        // 按钮事件绑定
        document.getElementById('suggestBtn').addEventListener('click', () => {
            openModal('suggestModal');
        });

        document.getElementById('bugBtn').addEventListener('click', () => {
            openModal('bugModal');
        });

        // 点击遮罩关闭模态框
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('show');
                }
            });
        });

        // 键盘Esc关闭模态框
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal-overlay.show').forEach(overlay => {
                    overlay.classList.remove('show');
                });
            }
        });
    </script>
</body>
</html>
